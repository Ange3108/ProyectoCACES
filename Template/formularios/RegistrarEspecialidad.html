<body data-base="../" data-page="especialidades">
	<main class="container py-5">
		<section class="form-shell">
			<div class="top-action mb-3">
				<a class="btn btn-add" href="../Especialidades.html">Volver al listado</a>
			</div>
			<div class="card form-card shadow-sm">
				<div class="card-body p-4 p-md-5">
					<h1 class="section-title mb-3">Registrar Especialidad Médica</h1>
					<p class="text-muted mb-4">Agrega una nueva especialidad al catálogo del sistema.</p>
					<form>
						<div class="row g-3">
							<div class="col-12 col-md-6">
								<label for="nombreEspecialidad" class="form-label">Nombre</label>
								<input type="text" class="form-control" id="nombreEspecialidad" placeholder="Ej. Endoscopia" required>
							</div>
							<div class="col-12 col-md-6">
								<label for="iconoEspecialidad" class="form-label">Ícono</label>
								<input type="text" class="form-control" id="iconoEspecialidad" placeholder="bi bi-heart-fill" required>
							</div>
							<div class="col-12">
								<label for="descripcionEspecialidad" class="form-label">Descripción</label>
								<textarea class="form-control" id="descripcionEspecialidad" rows="4" placeholder="Describe la especialidad" required></textarea>
							</div>
							<div class="col-12 col-md-6">
								<label for="estadoEspecialidad" class="form-label">Estado</label>
								<select class="form-select" id="estadoEspecialidad" required>
									<option value="">Selecciona una opción</option>
									<option value="activa">Activa</option>
									<option value="inactiva">Inactiva</option>
								</select>
							</div>
                            
						</div>
						<div class="d-flex flex-column flex-sm-row justify-content-end gap-2 mt-4">
							<button type="reset" class="btn btn-outline-secondary">Limpiar</button>
							<button type="submit" class="btn btn-add">Guardar especialidad</button>
						</div>
					</form>
				</div>
			</div>
		</section>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
