<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fisioterapia - CACES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container-fluid px-3 px-lg-4">
                <a class="navbar-brand brand-block" href="Inicio.html">
                    <span class="brand-icon"><img src="../img/logoCACES.jpg" alt="Logo"></span>
                    <span class="brand-name">CACES</span>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto nav-center-list">
                       <li class="nav-item"><a class="nav-link" href="../Inicio.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link active" href="../Especialidades.html">Especialidades</a></li>
                        <li class="nav-item"><a class="nav-link" href="../Quirurgicos.html">Procedimientos Quirúrgicos</a></li>
                        <li class="nav-item"><a class="nav-link" href="../Especialistas.html">Especialistas</a></li>
                        <li class="nav-item"><a class="nav-link" href="../GestionCitas.html">Citas</a></li>
                        <li class="nav-item"><a class="nav-link" href="../Turismo.html">Turismo Médico</a></li>
                    </ul>
                    <div class="navbar-actions">
                        <div class="lang-switch" aria-label="Seleccionar idioma">
                            <button class="lang-btn" type="button">EN</button>
                            <button class="lang-btn active" type="button">ES</button>
                        </div>
                    </div>
                </div>
                <a class="account-link" href="#" aria-label="Cuenta">
                    <i class="bi bi-person"></i>
                </a>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <section class="mt-4">
            <h1 class="section-title">Fisioterapia</h1> 
            <p class="text-muted mb-4">
                Actualizar sesión de fisioterapia
            </p>

            <form action="">
                <div class="d-flex justify-content-center mt-3">
                    <div class="col-12 col-md-12 col-lg-10">
                        <article class="card info-card border-0 shadow-lg">
                            <div class="card-body p-4">

                                <h3>1. Datos del Paciente</h3>

                                <div class="form-group">
                                    <label for="nombre">Nombre Completo</label>
                                    <input type="text" id="nombre" class="form-control" name="nombre" required
                                        placeholder="Ej. Juan Pérez">
                                </div>

                                <div class="row">
                                    <div class="col-md-6 form-group">
                                        <label for="telefono">Teléfono</label>
                                        <input type="tel" class="form-control" id="telefono" name="telefono" required>
                                    </div>

                                    <div class="col-md-6 form-group">
                                        <label for="email">Correo Electrónico</label>
                                        <input type="email" class="form-control" id="email" name="email" required>
                                    </div>
                                </div>

                                <h3 class="mt-4">2. Información del Caso</h3>

                                <div class="form-group">
                                    <label for="motivo">Motivo de la consulta</label>
                                    <textarea id="motivo" class="form-control" name="motivo" rows="3"
                                        placeholder="Describa brevemente su dolor o lesión"></textarea>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 form-group">
                                        <label for="zona_cuerpo">Área a tratar</label>
                                        <select id="zona_cuerpo" class="form-select" name="zona_cuerpo">
                                            <option value="cervical">Cervical</option>
                                            <option value="dorsal">Dorsal</option>
                                            <option value="lumbar">Lumbar</option>
                                            <option value="hombro">Hombro</option>
                                            <option value="rodilla">Rodilla</option>
                                            <option value="otro">Otro</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6 form-group">
                                        <label for="dolor">Nivel de Dolor (1-10)</label>
                                        <input type="number" id="dolor" name="dolor" class="form-control" min="1"
                                            max="10" value="5">
                                    </div>
                                </div>

                                <h3 class="mt-4">3. Agenda y Seguridad</h3>

                                <div class="form-group">
                                    <label for="fecha_hora">Fecha y Hora Preferida</label>
                                    <input type="datetime-local" id="fecha_hora" name="fecha_hora" class="form-control"
                                        required>
                                </div>

                                <div class="form-group">
                                    <label class="mt-4">Antecedentes Importantes</label>

                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="cirugia" name="antecedentes"
                                            value="cirugia">
                                        <label class="form-check-label" for="cirugia">Cirugías recientes</label>
                                    </div>

                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="implante"
                                            name="antecedentes" value="implante">
                                        <label class="form-check-label" for="implante">Prótesis o Implantes
                                            metálicos</label>
                                    </div>
                                </div>


                                <button class="btn btn-cotizar mt-4">
                                    Guardar cambios
                                </button>

                            </div>
                        </article>
                    </div>
                </div>
            </form>

        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
