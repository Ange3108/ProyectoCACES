<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terapia Respiratoria - CACES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container-fluid px-3 px-lg-4">
                <a class="navbar-brand brand-block" href="Inicio.html">
                    <span class="brand-icon"><img src="../img/logoCACES.jpg" alt="Logo"></span>
                    <span class="brand-name">CACES</span>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto nav-center-list">
                        <li class="nav-item"><a class="nav-link" href="Inicio.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="Especialidades.html">Especialidades</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Procedimientos Quirúrgicos</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Especialistas</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Citas</a></li>
                        <li class="nav-item"><a class="nav-link active" href="Turismo.html">Turismo Médico</a></li>
                    </ul>
                    <div class="navbar-actions">
                        <div class="lang-switch" aria-label="Seleccionar idioma">
                            <button class="lang-btn" type="button">EN</button>
                            <button class="lang-btn active" type="button">ES</button>
                        </div>
                    </div>
                </div>
                <a class="account-link" href="#" aria-label="Cuenta">
                    <i class="bi bi-person"></i>
                </a>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <section class="mt-4">
            <h1 class="section-title">Terapia Respiratoria</h1>
            <p class="text-muted mb-4">
                Reservar cita de terapia respiratoria
            </p>

            <form action="">
                <div class="d-flex justify-content-center mt-3">
                    <div class="col-12 col-md-12 col-lg-10">
                        <article class="card info-card border-0 shadow-lg">
                            <div class="card-body p-4">

                                <h3>1. Datos del Paciente</h3>

                                <div class="form-group">
                                    <label for="nombre">Nombre Completo</label>
                                    <input type="text" id="nombre" class="form-control" name="nombre" required
                                        placeholder="Ej. Juan Pérez">
                                </div>

                                <div class="row">
                                    <div class="col-md-6 form-group">
                                        <label for="telefono">Teléfono</label>
                                        <input type="tel" class="form-control" id="telefono" name="telefono" required>
                                    </div>

                                    <div class="col-md-6 form-group">
                                        <label for="email">Correo Electrónico</label>
                                        <input type="email" class="form-control" id="email" name="email" required>
                                    </div>
                                </div>

                                <h3 class="mt-4">2. Estado de salud respiratoria del paciente</h3>

                                <div class="row">

                                    <span class="section-title">Estado Respiratorio</span>
                                    <div class="col-md-6 form-group">
                                        <label for="diagnostico">Diagnóstico Principal</label>
                                        <select id="diagnostico" class="form-select" name="diagnostico">
                                            <option value="epoc">EPOC
                                            </option>
                                            <option value="asma">Asma
                                            </option>
                                            <option value="secuela_covid">Secuela COVID-19</option>
                                            <option value="otro">Otro / En estudio</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6 form-group">
                                        <label for="usa_oxigeno">¿Usa Oxígeno?</label>
                                        <select id="usa_oxigeno" class="form-select" name="usa_oxigeno">
                                            <option value="no">No
                                            </option>
                                            <option value="si_permanente">Sí, permanente
                                            </option>
                                            <option value="si_esfuerzo">Sí, solo al esfuerzo</option>
                                        </select>
                                    </div>

                                    <div class="form-group mt-3">
                                        <label for="saturacion">Saturación habitual (%)</label>
                                        <input type="number" id="saturacion" class="form-control" name="saturacion"
                                            placeholder="Ej: 94">
                                    </div>

                                    <h3 class="mt-4">3. Seguridad y Contraindicaciones</h3>

                                    <div class="form-group">
                                        <label for="cirugias">¿Ha tenido cirugías de tórax o abdomen en el último
                                            mes?</label>
                                        <select id="cirugias" class="form-select" name="cirugias">
                                            <option value="no">No
                                            </option>
                                            <option value="si">Sí (Indicar fecha y tipo en notas)
                                            </option>
                                        </select>
                                    </div>

                                    <div class="form-group mt-3">
                                        <label for="notas_adic">Notas adicionales / Síntomas actuales</label>
                                        <textarea class="form-control" type="text" id="notas_adic" name="notas"
                                            placeholder="Ej: Mucha flema, fatiga al caminar...">
                                        </textarea>
                                    </div>

                                    <div class="form-group mt-3">
                                        <label for="fecha_hora">Fecha y Hora Propuesta</label>
                                        <input type="datetime-local" id="fecha_hora" name="fecha_hora"
                                            class="form-control" required>
                                    </div>

                                    <div class="form-check mt-3">
                                        <input class="form-check-input" type="checkbox" id="terminos" name="terminos"
                                            required>
                                        <label class="form-check-label small" for="terminos">
                                            Acepto las políticas de cancelación y privacidad.
                                        </label>
                                    </div>



                                </div>
                                <button class="btn btn-cotizar mt-4">
                                    Guardar y Agendar
                                </button>
                            </div>
                        </article>
                    </div>
                </div>
            </form>

        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
