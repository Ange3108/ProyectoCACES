<body data-base="../" data-page="turismo">
	<main class="container py-5">
		<section class="form-shell">
			<div class="top-action mb-3">
				<a class="btn btn-add" href="../Turismo.html">Volver al listado</a>
			</div>
			<div class="card form-card shadow-sm">
				<div class="card-body p-4 p-md-5">
					<h1 class="section-title mb-3">Registrar Paquete de Turismo Médico</h1>
					<p class="text-muted mb-4">Crea paquetes para el módulo de turismo médico.</p>
					<form>
						<div class="row g-3">
							<div class="col-12 col-md-6">
								<label for="nombrePaquete" class="form-label">Nombre del paquete</label>
								<input type="text" class="form-control" id="nombrePaquete" placeholder="Ej. Evaluación Integral" required>
							</div>
							<div class="col-12 col-md-3">
								<label for="precioPaquete" class="form-label">Precio</label>
								<input type="text" class="form-control" id="precioPaquete" placeholder="USD 480" required>
							</div>
							<div class="col-12 col-md-3">
								<label for="duracionPaquete" class="form-label">Duración</label>
								<input type="text" class="form-control" id="duracionPaquete" placeholder="3 días" required>
							</div>
							<div class="col-12">
								<label for="descripcionPaquete" class="form-label">Descripción</label>
								<textarea class="form-control" id="descripcionPaquete" rows="4" placeholder="Incluye consulta, exámenes, traslado, etc." required></textarea>
							</div>
						</div>
						<div class="d-flex flex-column flex-sm-row justify-content-end gap-2 mt-4">
							<button type="reset" class="btn btn-outline-secondary">Limpiar</button>
							<button type="submit" class="btn btn-add">Guardar paquete</button>
						</div>
					</form>
				</div>
			</div>
		</section>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
