<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CACES</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

    <section class="login-wrapper">
        <div class="login-card">
            <div class="text-center mb-4">
                <img src="img/logo.jpg" alt="Logo CACES" style="width: 90px; height: 90px; object-fit: cover; border-radius: 15px;">
            </div>

            <h2 class="login-title">Iniciar sesión</h2>
            <p class="login-text">Acceda al sistema del Centro Ambulatorio de Cirugía Escalón</p>

            <form>
                <div class="form-group mb-3">
                    <label for="correo" class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" id="correo" placeholder="Ingrese su correo">
                </div>

                <div class="form-group mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña">
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="recordar">
                        <label class="form-check-label" for="recordar">
                            Recordarme
                        </label>
                    </div>

                    <a href="#" style="color: #049DD9; text-decoration: none; font-weight: 600;">
                        ¿Olvidó su contraseña?
                    </a>
                </div>

                <div class="d-grid mb-3">
                    <button type="button" class="btn btn-main">Ingresar</button>
                </div>

                <p class="text-center mb-0" style="color: #5b6b79;">
                    ¿Necesita ayuda?
                    <a href="SoporteContacto.html" style="color: #049DD9; text-decoration: none; font-weight: 700;">
                        Contáctenos
                    </a>
                </p>
            </form>
        </div>
    </section>

</body>
</html>
