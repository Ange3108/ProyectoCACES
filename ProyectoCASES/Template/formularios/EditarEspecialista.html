    <!-- SCRIPT EDITAR MÉDICO -->
    <script>

        const params = new URLSearchParams(window.location.search);

        const id = params.get("id");

        async function cargarMedico() {

            try {

                const response = await fetch(`https://localhost:7197/api/Medico/${id}`);

                const medico = await response.json();

                document.getElementById("nombreEspecialista").value = medico.nombre;
                document.getElementById("especialidad").value = medico.especialidad;
                document.getElementById("experiencia").value = medico.experiencia;
                document.getElementById("correo").value = medico.correo;
                document.getElementById("telefono").value = medico.telefono;
                document.getElementById("descripcion").value = medico.descripcion;
                document.getElementById("estadoEspecialista").value = medico.estado;

            } catch (error) {

                console.log("Error al cargar médico:", error);

            }

        }

        async function actualizarMedico(event) {

            event.preventDefault();

            const medicoActualizado = {

                idMedico: parseInt(id),
                nombre: document.getElementById("nombreEspecialista").value,
                especialidad: document.getElementById("especialidad").value,
                experiencia: parseInt(document.getElementById("experiencia").value),
                correo: document.getElementById("correo").value,
                telefono: document.getElementById("telefono").value,
                descripcion: document.getElementById("descripcion").value,
                estado: document.getElementById("estadoEspecialista").value

            };

            try {

                const response = await fetch(`https://localhost:7197/api/Medico/${id}`, {

                    method: "PUT",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(medicoActualizado)

                });

                if (response.ok) {

                    alert("Médico actualizado correctamente");

                    window.location.href = "../Especialistas.html";

                } else {

                    alert("Error al actualizar médico");

                }

            } catch (error) {

                console.log("Error:", error);

            }

        }

        document.querySelector("form")
            .addEventListener("submit", actualizarMedico);

        cargarMedico();

    </script>
